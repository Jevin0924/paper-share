name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - paper-reports
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore generated reports
        shell: bash
        run: |
          if [ -f reports_bundle.tgz.b64 ]; then
            base64 -d reports_bundle.tgz.b64 | tar -xzf -
          fi

      - name: Generate missing arXiv assets
        if: hashFiles('reports/reports/*/index.html') != ''
        shell: bash
        run: |
          python3 -m pip install --quiet pymupdf
          python3 <<'PY'
          from pathlib import Path
          import re
          import urllib.request

          import fitz

          reports_root = Path("reports")
          for report_dir in sorted((reports_root / "reports").glob("*")):
              html_path = report_dir / "index.html"
              if not html_path.exists():
                  continue
              arxiv_id = report_dir.name
              html = html_path.read_text(encoding="utf-8", errors="ignore")
              referenced = sorted(set(re.findall(r"\.\./\.\./assets/" + re.escape(arxiv_id) + r"/([^\"']+)", html)))
              if not referenced:
                  continue
              assets_dir = reports_root / "assets" / arxiv_id
              if all((assets_dir / name).exists() for name in referenced):
                  continue
              assets_dir.mkdir(parents=True, exist_ok=True)
              try:
                  req = urllib.request.Request(
                      f"https://arxiv.org/pdf/{arxiv_id}",
                      headers={"User-Agent": "paper-share-pages/1.0"},
                  )
                  with urllib.request.urlopen(req, timeout=90) as response:
                      pdf_bytes = response.read()
                  doc = fitz.open(stream=pdf_bytes, filetype="pdf")
                  seen = set()
                  count = 0
                  target_count = max(4, len(referenced))
                  for page_index, page in enumerate(doc, start=1):
                      for image in page.get_images(full=True):
                          xref = int(image[0])
                          if xref in seen:
                              continue
                          seen.add(xref)
                          pix = fitz.Pixmap(doc, xref)
                          try:
                              if pix.width < 220 or pix.height < 160:
                                  continue
                              if pix.n - pix.alpha > 3:
                                  pix = fitz.Pixmap(fitz.csRGB, pix)
                              count += 1
                              filename = f"figure-{count:02d}-p{page_index}.png"
                              pix.save(str(assets_dir / filename))
                              if count >= target_count:
                                  raise StopIteration
                          finally:
                              pix = None
              except StopIteration:
                  pass
              except Exception as exc:
                  print(f"warning: failed to generate assets for {arxiv_id}: {exc}")
          PY

      - name: Prepare static site
        shell: bash
        run: |
          rm -rf public
          mkdir -p public
          if [ -d reports ]; then
            cp -a reports/. public/
          else
            cat > public/index.html <<'HTML'
          <!doctype html>
          <html lang="zh-CN">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Paper Share</title>
          </head>
          <body>
            <h1>Paper Share</h1>
            <p>No reports have been published yet.</p>
          </body>
          </html>
          HTML
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
